services:
  - type: web
    name: iam-job-finder
    runtime: python
    repo: https://github.com/YOUR_USERNAME/iam-job-finder
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0